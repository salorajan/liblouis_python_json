# Version: 1.0.2
# Created: 2026-05-21 08:23:00 MST
# Description: WCAG 2.1 compliant GitHub Actions workflow for static deployment of liblouis_python_json
name: Deploy static content to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 1.0 Checkout repository
        uses: actions/checkout@v4
      - name: 2.0 Setup Pages configuration
        uses: actions/configure-pages@v5
      - name: 3.0 Upload static artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: 4.0 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
