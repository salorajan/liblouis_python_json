# Version: 1.0.3
# Created: 2026-05-21 08:45:00 MST
# Description: Bootstrapping workflow to initialize the uncreated GitHub Pages site entity
name: Deploy static content to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 1.0 Checkout repository
        uses: actions/checkout@v4
      # Step 2.0 is bypassed on version 1.0.3 to resolve the initial 404 setup paradox
      # - name: 2.0 Setup Pages configuration
      #   uses: actions/configure-pages@v5
       Wilk
      - name: 3.0 Upload static artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: 4.0 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
