# Version: 1.0.5
# Created: 2026-05-21 09:11:00 MST
# Description: Consolidated single-file deployment configuration for liblouis_python_json
name: Deploy Static Pages Site
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 1.0 Checkout repository
        uses: actions/checkout@v4
      - name: 2.0 Upload static artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: 3.0 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
